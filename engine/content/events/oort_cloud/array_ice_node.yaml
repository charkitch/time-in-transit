id: ARRAY_ICE_NODE
title: "THE SECOND EYE"
requires:
  - !AnyFlagSet quasar_array_stage1_done
  - !AnyFlagNotSet quasar_array_stage2_done
  - !ChainTargetHere quasar_array
narrativeLines:
  - >-
    Different system, different comet, same quality of silence. This station has a greenhouse
    module bolted to its spine — someone is growing actual tomatoes out here in the dark
    between stars.
  - >-
    A young technician is waiting for you at the lock, bouncing on his heels. He checks
    the lens crate seals before he checks your name. His relief is physical.
  - >-
    "Three months we've been running on a patched secondary," he says, already walking
    you toward the installation bay. "Come see what we've been looking at with one bad eye."
choices:
  - id: hand_off_lens
    label: Deliver the lenses and see what they've found
    description: "Complete delivery and view the data"
    effect:
      tradingReputation: 0
    nextMoment:
      narrativeLines:
        - >-
          The bay is small, warm, and covered in handwritten charts. Someone has pinned
          actual photographs to the wall — not screens, photographs, printed on paper that
          curls at the edges.
        - >-
          He pulls up a display showing two light curves. One is steady, almost boring.
          The other looks like a heartbeat that forgot how to stop.
        - >-
          "Both quasars," he says. "Brightest things in the universe, give or take. The calm one
          has been calm forever. The other one — something happened to it. A long time ago and
          very far away. And whatever happened, the light from it is still arriving."
        - >-
          He traces the oscillation with his finger. "It's not random. It's ringing. Like a bell
          somebody struck so hard the sound is still travelling."
      choices:
        - id: encourage_open_briefing
          label: Ask if anyone else is watching this
          description: "CR 450 delivery pay, +Reputation, stage complete"
          effect:
            creditsReward: 450
            tradingReputation: 1
            fuelReward: 0.4
            setsFlags: [quasar_array_stage2_done]
        - id: recommend_caution
          label: Ask how hard somebody would have to hit a quasar to make it ring
          description: "CR 550 discretion pay, stage complete"
          effect:
            creditsReward: 550
            setsFlags: [quasar_array_stage2_done]
  - id: postpone_handoff
    label: Keep the crate aboard for now
    description: No effect
    effect: {}
