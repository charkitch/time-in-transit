id: ARRAY_OORT_BRIEFING
title: THE QUIET ARRAY
requires:
  - !AnyFlagNotSet quasar_array_stage1_done
narrativeLines:
  - >-
    The station is dug into a slowly tumbling comet, frost on every surface that isn't warm enough
    to touch. Someone has strung festival lights along the docking arm. They flicker in a pattern
    that might be decorative and might be a countdown.
  - >-
    Inside, the common room smells like soldering flux and cardamom. A woman in a thermal
    vest is building something at a workbench — not electronics, a wooden ship in a bottle.
    She finishes a knot before she looks up.
  - >-
    "You're the trader? Good. We need someone who can move glass between stars without
    breaking it." She gestures at a row of crates, each one swaddled like an infant. "Telescope
    components. Very old designs, very new glass."
  - >-
    When you ask what they're building out here in the deep cold, she smiles like someone
    deciding how much of a good story to tell on a first meeting.
    "A very long eye," she says. "Pointed at something very far away."
choices:
  - id: hear_full_brief
    label: Ask what's worth watching from the edge of nowhere
    description: "Learn more about the project"
    effect:
      tradingReputation: 0
    nextMoment:
      narrativeLines:
        - >-
          She pours you tea from a kettle that has clearly survived more star crossings than
          most ships. It tastes like smoke and honey.
        - >-
          "Light takes its time getting here from the interesting parts of the universe," she says.
          "We're trying to catch some of it while it's still worth catching. Certain objects, very
          distant, very bright — they've been changing. Or rather, the light from their changes is
          finally arriving."
        - >-
          She taps the bottle ship with a fingernail. "We need relay nodes in four or five systems.
          Oort stations, specifically — nice and quiet, no local light pollution. Each one watches
          the same targets. Combine the data, and we can see things no single telescope ever could."
        - >-
          "What we can't do is move precision optics across interstellar space without them
          arriving as very expensive gravel. That's you."
      choices:
        - id: accept_lens_contract
          label: "You had me at 'very long eye'"
          description: "+Reputation, begin the telescope relay chain"
          effect:
            tradingReputation: 1
            setsFlags: [quasar_array_stage1_done]
        - id: negotiate_hazard_bonus
          label: Accept, but insist the tea is included at every stop
          description: "CR 250 advance, begin the chain"
          effect:
            creditsReward: 250
            setsFlags: [quasar_array_stage1_done]
        - id: decline_briefing
          label: Decline politely
          description: No effect
          effect: {}
  - id: no_time_today
    label: You're passing through
    description: No effect
    effect: {}
